name: Update GitHub Stats Cards

on:
  schedule:
    - cron: "0 */12 * * *"   # refreshes every 12 hours
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: stats
          options: >
            username=${{ github.repository_owner }}
            &show_icons=true
            &theme=tokyonight
            &hide_border=true
            &bg_color=1a1b27
            &title_color=7aa2f7
            &icon_color=bb9af7
            &text_color=c0caf5
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate top languages card
        uses: stats-organization/github-readme-stats-action@v2
        with:
          card: top-langs
          options: >
            username=${{ github.repository_owner }}
            &layout=compact
            &langs_count=6
            &theme=tokyonight
            &hide_border=true
            &bg_color=1a1b27
            &title_color=7aa2f7
            &text_color=c0caf5
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add profile/
          git diff --staged --quiet || git commit -m "chore: update stats cards"
          git push
